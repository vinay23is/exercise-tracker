<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="description" content="Daily exercise tracker with AI pose verification">
<meta name="theme-color" content="#667eea">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Exercises">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="icon.svg">
<link rel="manifest" href="manifest.json">
<title>Daily Exercise Tracker</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0f4f8;min-height:100vh;color:#1a202c;overscroll-behavior:none;}
button{min-height:56px;font-size:16px;padding:0 24px;}
.screen{display:none;min-height:100vh;min-height:100dvh;}
.screen.active{display:flex;flex-direction:column;}

/* ── HOME ── */
#home{align-items:center;justify-content:center;padding:2rem 1.5rem;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);}
.home-top{width:100%;max-width:480px;display:flex;justify-content:flex-end;gap:0.75rem;margin-bottom:0.75rem;flex-wrap:wrap;}
.sens-btn{background:rgba(255,255,255,0.18);border:none;color:white;border-radius:24px;padding:14px 22px;font-size:1rem;min-height:56px;cursor:pointer;display:flex;align-items:center;gap:10px;transition:transform 0.15s;}
.sens-btn .badge{background:rgba(255,255,255,0.28);border-radius:12px;padding:4px 10px;font-size:0.82rem;font-weight:700;}
.home-header{text-align:center;color:white;margin-bottom:2rem;}
.home-header h1{font-size:2.6rem;font-weight:800;margin-bottom:0.4rem;}
.home-header p{font-size:1.05rem;opacity:0.95;}
.profile-grid{display:grid;grid-template-columns:1fr 1fr;gap:1.5rem;width:100%;max-width:480px;}
.profile-card{background:white;border-radius:24px;padding:1.8rem 1.4rem;text-align:center;cursor:pointer;transition:transform 0.15s,box-shadow 0.15s;box-shadow:0 4px 24px rgba(0,0,0,0.16);user-select:none;min-height:160px;}
.profile-card:hover{transform:translateY(-4px);box-shadow:0 10px 36px rgba(0,0,0,0.2);}
.profile-card:active{transform:scale(0.98);}
.profile-avatar{width:72px;height:72px;border-radius:50%;margin:0 auto 0.8rem;display:flex;align-items:center;justify-content:center;font-size:2.4rem;}
.avatar-mom{background:#fed7e2;} .avatar-dad{background:#bee3f8;}
.profile-card h2{font-size:1.3rem;font-weight:700;margin-bottom:0.3rem;}
.streak-row{font-size:1.05rem;color:#2d3748;display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:10px;}
#mom-streak,#dad-streak{font-size:3rem;font-weight:800;color:#1a202c;}
.week-dots{display:flex;gap:3px;justify-content:center;margin-bottom:6px;}
.wdot{width:7px;height:7px;border-radius:50%;background:#e2e8f0;}
.wdot.hit{background:#48bb78;}
.wdot.today{background:#667eea;}
.done-badge{display:inline-block;background:#c6f6d5;color:#276749;font-size:0.72rem;font-weight:600;padding:2px 10px;border-radius:20px;}
.best-streak{font-size:1rem;color:#4a5568;font-weight:800;}

/* ── INSTRUCTIONS ── */
#instructions{background:#1a202c;color:white;align-items:center;justify-content:center;padding:1.5rem;}
.instructions-card{width:100%;max-width:520px;text-align:center;}
.instructions-canvas-wrap{position:relative;width:100%;aspect-ratio:4/3;background:#111827;border-radius:18px;overflow:hidden;margin:1.2rem 0;border:1px solid rgba(255,255,255,0.12);}
#instructions-canvas{width:100%;height:100%;}
.instructions-title{font-size:1.8rem;font-weight:800;margin-bottom:0.5rem;}
.instructions-text{font-size:1.05rem;color:#cbd5e0;line-height:1.5;margin-bottom:1.2rem;}
.start-camera-btn{width:100%;background:#48bb78;color:white;border:none;border-radius:16px;font-weight:800;cursor:pointer;}
.instructions-back{margin-top:0.8rem;width:100%;background:#4a5568;color:white;border:none;border-radius:16px;font-weight:700;cursor:pointer;}

/* ── EXERCISE ── */
#exercise{background:#1a202c;color:white;}
.ex-topbar{display:flex;align-items:center;padding:1rem 1.2rem;background:#2d3748;gap:1rem;flex-shrink:0;padding-top:max(1rem,env(safe-area-inset-top));}
.back-btn{background:rgba(255,255,255,0.12);border:none;color:white;min-width:56px;width:56px;height:56px;border-radius:18px;font-size:1.2rem;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.topbar-info{flex:1;}
.topbar-info h2{font-size:1.3rem;font-weight:700;}
.topbar-info p{font-size:0.9rem;color:#cbd5e0;}
.streak-badge{background:linear-gradient(135deg,#f6ad55,#ed8936);border-radius:16px;padding:10px 16px;text-align:center;flex-shrink:0;}
.streak-badge .num{font-size:1.8rem;font-weight:800;line-height:1;}
.streak-badge .lbl{font-size:0.72rem;opacity:0.95;}

.ex-main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0;}

/* Camera */
.camera-zone{position:relative;width:100%;flex:1;background:#000;overflow:hidden;min-height:0;}
#camera-feed{width:100%;height:100%;object-fit:cover;transform:scaleX(-1);}
#stick-canvas{position:absolute;inset:0;width:100%;height:100%;}

/* Body-warning banner */
.body-warn{position:absolute;top:96px;left:50%;transform:translateX(-50%);width:calc(100% - 32px);max-width:calc(100% - 40px);background:rgba(127,29,29,0.94);border:3px solid rgba(252,129,129,0.96);color:white;font-size:1.1rem;font-weight:800;padding:14px 18px;border-radius:16px;text-align:center;opacity:0;transition:opacity 0.3s,transform 0.3s;pointer-events:none;z-index:7;}
.body-warn.show{opacity:1;transform:translateX(-50%) translateY(2px);animation:pulseWarn 1.1s ease-in-out infinite;}
@keyframes pulseWarn{0%,100%{box-shadow:0 0 0 0 rgba(252,129,129,0.65)}50%{box-shadow:0 0 0 8px rgba(252,129,129,0)}}

.overlay-counter{position:absolute;top:20px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.65);color:white;font-size:48px;font-weight:800;padding:8px 24px;border-radius:999px;z-index:6;pointer-events:none;min-width:170px;text-align:center;line-height:1;}

/* Loading overlay */
.model-overlay{position:absolute;inset:0;background:rgba(0,0,0,0.92);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0.8rem;z-index:20;color:white;text-align:center;padding:2rem;}
.model-overlay.hidden{display:none;}
.spinner{width:38px;height:38px;border:3px solid rgba(255,255,255,0.2);border-top-color:white;border-radius:50%;animation:spin 0.8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.load-label{font-size:0.9rem;font-weight:500;}
.load-sub{font-size:0.78rem;color:#a0aec0;max-width:230px;line-height:1.5;}
.load-bar-track{width:160px;height:3px;background:rgba(255,255,255,0.15);border-radius:2px;overflow:hidden;}
.load-bar{height:100%;background:#63b3ed;border-radius:2px;width:0%;transition:width 0.6s;}
.overlay-retry{margin-top:0.5rem;padding:9px 22px;border-radius:10px;border:none;background:white;color:#1a202c;font-weight:600;font-size:0.9rem;cursor:pointer;}

/* CV strip */
.cv-strip{background:#1a365d;padding:6px 14px;display:flex;align-items:center;gap:8px;flex-shrink:0;min-height:34px;transition:background 0.15s;}
.cv-strip.flash{background:#1a4731;}
.cv-dot{width:8px;height:8px;border-radius:50%;background:#4a5568;flex-shrink:0;}
.cv-dot.on{background:#48bb78;animation:blink 1.2s ease infinite;}
.cv-dot.warn{background:#f6ad55;animation:blink 1.2s ease infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.4}}
.cv-text{font-size:0.78rem;color:#90cdf4;flex:1;}
.cv-reps{font-size:0.8rem;font-weight:700;color:#68d391;white-space:nowrap;}

/* Panel */
.ex-panel{background:#2d3748;padding:1rem 1.3rem;flex-shrink:0;padding-bottom:max(1rem,env(safe-area-inset-bottom));}
.ex-name-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;gap:12px;}
.ex-name{font-size:1.45rem;font-weight:800;line-height:1.1;}
.ex-counter{background:#4a5568;border-radius:12px;padding:8px 14px;font-size:1.1rem;color:#e2e8f0;min-width:86px;text-align:center;}
.progress-track{background:#4a5568;border-radius:6px;height:8px;margin-bottom:10px;overflow:hidden;}
.progress-fill{height:100%;border-radius:6px;background:linear-gradient(90deg,#48bb78,#38a169);transition:width 0.4s;}
.progress-fill.done{background:linear-gradient(90deg,#68d391,#48bb78);}
.ex-desc{font-size:0.95rem;color:#cbd5e0;margin-bottom:12px;line-height:1.5;}
.ex-dots{display:flex;gap:8px;justify-content:center;margin-bottom:10px;}
.ex-dot{width:11px;height:11px;border-radius:50%;background:#4a5568;transition:background 0.3s;cursor:pointer;}
.ex-dot.cur{background:#63b3ed;}
.ex-dot.ok{background:#48bb78;}
.ex-nav{display:flex;gap:0.9rem;margin-bottom:1rem;}
.ex-nav button{flex:1;padding:14px;border:1.5px solid #4a5568;background:transparent;color:white;border-radius:14px;font-size:1rem;cursor:pointer;transition:background 0.1s;min-height:56px;}
.ex-nav button:hover{background:#4a5568;}
.done-btn{width:100%;padding:16px 18px;background:linear-gradient(135deg,#48bb78,#38a169);color:white;border:none;border-radius:16px;font-size:1.15rem;font-weight:800;cursor:pointer;box-shadow:0 5px 18px rgba(72,187,120,0.35);transition:transform 0.1s,opacity 0.2s;}
.done-btn:hover:not(:disabled){transform:translateY(-2px);}
.done-btn:disabled{background:#4a5568;box-shadow:none;cursor:default;transform:none;}

/* ── CELEBRATION ── */
.celebration{position:fixed;inset:0;background:rgba(0,0,0,0.9);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;opacity:0;pointer-events:none;transition:opacity 0.3s;padding:2rem;}
.celebration.show{opacity:1;pointer-events:all;}
.celebration h2{font-size:1.8rem;color:white;margin-bottom:0.4rem;text-align:center;}
.celebration p{color:#a0aec0;font-size:1rem;margin-bottom:1.5rem;text-align:center;}
.confetti-area{position:absolute;inset:0;pointer-events:none;overflow:hidden;}
.cel-close{background:white;color:#1a202c;border:none;border-radius:14px;padding:13px 36px;font-size:1rem;font-weight:700;cursor:pointer;z-index:1;}
.big-streak{font-size:3.5rem;line-height:1;margin-bottom:0.4rem;}
.cel-exercises{display:flex;flex-direction:column;gap:6px;margin-bottom:1.5rem;width:100%;max-width:260px;}
.cel-ex-row{display:flex;align-items:center;gap:10px;background:rgba(255,255,255,0.08);border-radius:10px;padding:7px 12px;}
.cel-ex-row span{font-size:0.95rem;color:#e2e8f0;}
.cel-check{color:#68d391;font-size:1.1rem;flex-shrink:0;}
.cel-share{margin-bottom:0.8rem;background:#63b3ed;color:white;}
.debug-panel{position:absolute;right:10px;bottom:10px;width:min(330px,calc(100% - 20px));max-height:45%;overflow:auto;background:rgba(0,0,0,0.78);color:#e2e8f0;border:1px solid rgba(255,255,255,0.18);border-radius:10px;padding:10px;font:12px/1.45 ui-monospace,SFMono-Regular,Menlo,monospace;white-space:pre-wrap;z-index:8;display:none;}
.debug-panel.show{display:block;}

@media (orientation: landscape) {
  .ex-main{flex-direction:row;}
  .camera-zone{width:60%;min-height:100vh;}
  .ex-panel{width:40%;}
  .ex-main > .camera-zone{flex:1;}
  .ex-main > .ex-panel{flex:0 0 40%;}
}
</style>
</head>
<body>

<!-- HOME -->
<div id="home" class="screen active">
  <div class="home-top">
    <button class="sens-btn" id="sens-btn" onclick="toggleSens()">
      Sensitivity <span class="badge" id="sens-label">Standard</span>
    </button>
    <button class="sens-btn" id="voice-btn" onclick="toggleVoice()">
      Voice <span class="badge" id="voice-label">Off</span>
    </button>
  </div>
  <div class="home-header">
    <h1>Daily Exercises 💪</h1>
    <p>Who's working out today?</p>
  </div>
  <div class="profile-grid">
    <div class="profile-card" onclick="openProfile('mom')">
      <div class="profile-avatar avatar-mom">👩</div>
      <h2>Mom</h2>
      <div class="streak-row">🔥 <span id="mom-streak">0 day streak</span></div>
      <div class="week-dots" id="mom-dots"></div>
      <div id="mom-badge" class="done-badge" style="display:none">✓ Done today</div>
      <div class="best-streak" id="mom-best"></div>
    </div>
    <div class="profile-card" onclick="openProfile('dad')">
      <div class="profile-avatar avatar-dad">👨</div>
      <h2>Dad</h2>
      <div class="streak-row">🔥 <span id="dad-streak">0 day streak</span></div>
      <div class="week-dots" id="dad-dots"></div>
      <div id="dad-badge" class="done-badge" style="display:none">✓ Done today</div>
      <div class="best-streak" id="dad-best"></div>
    </div>
  </div>
</div>

<!-- INSTRUCTIONS -->
<div id="instructions" class="screen">
  <div class="instructions-card">
    <div class="instructions-title" id="instructions-title"></div>
    <div class="instructions-canvas-wrap">
      <canvas id="instructions-canvas"></canvas>
    </div>
    <div class="instructions-text" id="instructions-text"></div>
    <button class="start-camera-btn" onclick="startWorkout()">I'm ready — Start camera</button>
    <button class="instructions-back" onclick="goHome()">Back Home</button>
  </div>
</div>

<!-- EXERCISE -->
<div id="exercise" class="screen">
  <div class="ex-topbar">
    <button class="back-btn" onclick="goHome()">←</button>
    <div class="topbar-info">
      <h2 id="profile-name" onclick="tapProfileName()">Mom</h2>
      <p id="profile-date"></p>
    </div>
    <div class="streak-badge">
      <div class="num" id="streak-num">0</div>
      <div class="lbl">🔥 streak</div>
    </div>
  </div>
  <div class="ex-main">
    <div class="camera-zone" id="camera-zone">
      <video id="camera-feed" autoplay playsinline muted></video>
      <canvas id="stick-canvas"></canvas>
      <div class="body-warn" id="body-warn">Step back — full body not visible</div>
      <div class="overlay-counter" id="overlay-counter">0 / 0</div>
      <div class="debug-panel" id="debug-panel"></div>
      <div class="model-overlay" id="model-overlay">
        <div class="spinner"></div>
        <div class="load-label" id="load-label">Starting camera…</div>
        <div class="load-bar-track"><div class="load-bar" id="load-bar"></div></div>
        <div class="load-sub" id="load-sub">Stand 5–8 ft away so your full body is visible</div>
      </div>
    </div>
    <div class="cv-strip" id="cv-strip">
      <div class="cv-dot warn" id="cv-dot"></div>
      <span class="cv-text" id="cv-text">Starting…</span>
      <span class="cv-reps" id="cv-reps"></span>
    </div>
    <div class="ex-panel">
      <div class="ex-name-row">
        <div class="ex-name" id="ex-name"></div>
        <div class="ex-counter" id="ex-counter"></div>
      </div>
      <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>
      <div class="ex-desc" id="ex-desc"></div>
      <div class="ex-dots" id="ex-dots"></div>
      <div class="ex-nav">
        <button onclick="prevEx()">← Prev</button>
        <button onclick="nextEx()">Next →</button>
      </div>
      <button class="done-btn" id="done-btn" onclick="markDone()" disabled>
        Complete all exercises first
      </button>
    </div>
  </div>
</div>

<!-- CELEBRATION -->
<div class="celebration" id="celebration">
  <div class="confetti-area" id="confetti-area"></div>
  <div class="big-streak" id="cel-streak">🔥</div>
  <h2 id="cel-title"></h2>
  <div class="cel-exercises" id="cel-exercises"></div>
  <p id="cel-desc"></p>
  <button class="cel-close cel-share" onclick="shareCompletion()">Tell Vinay I'm done 💪</button>
  <button class="cel-close" onclick="closeCel()">Back Home</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.17.0/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection@2.1.3/dist/pose-detection.min.js"></script>
<script>
'use strict';

// ── KEYPOINTS ────────────────────────────────
const BONES = [
  [0,5],[0,6],[5,6],[5,7],[7,9],[6,8],[8,10],
  [5,11],[6,12],[11,12],[11,13],[13,15],[12,14],[14,16]
];
const CORE_KP = [5,6,11,12,13,14]; // shoulders, hips, knees

function okKp(kp,t=0.28){return kp&&kp.score>=t;}

function normKps(kps,vw,vh){return kps.map(k=>({...k,x:k.x/vw,y:k.y/vh}));}

function jointAngle(a,b,c){
  const v1x=a.x-b.x,v1y=a.y-b.y,v2x=c.x-b.x,v2y=c.y-b.y;
  const dot=v1x*v2x+v1y*v2y;
  const mag=Math.sqrt(v1x**2+v1y**2)*Math.sqrt(v2x**2+v2y**2);
  if(!mag)return 180;
  return Math.acos(Math.max(-1,Math.min(1,dot/mag)))*180/Math.PI;
}

// ── SENSITIVITY ──────────────────────────────
// 'easy' multiplies thresholds by 0.65 — less movement required
let SENS = localStorage.getItem('extrack_sens')||'standard';
const SF = ()=> SENS==='easy' ? 0.65 : 1.0;

// ── AUDIO ────────────────────────────────────
let _audio = null;
let speechReady = false;
let lastWarnSpeak = 0;
const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
const isAndroid = /Android/.test(navigator.userAgent);
let VOICE = localStorage.getItem('extrack_voice')==='true';
let debugMode = false;
let profileTapCount = 0;
let profileTapTimer = null;
let silentAudio = null;

function getAudio(){
  if(!_audio) try{_audio=new(window.AudioContext||window.webkitAudioContext)();}catch(e){}
  return _audio;
}
function initSpeech(){
  if(speechReady || !('speechSynthesis' in window))return;
  speechReady=true;
  window.speechSynthesis.getVoices();
}
function speak(text){
  if(!VOICE||!('speechSynthesis' in window))return;
  const utter=new SpeechSynthesisUtterance(text);
  utter.volume=1;utter.rate=1;utter.pitch=1;
  window.speechSynthesis.cancel();
  window.speechSynthesis.speak(utter);
}
function speakWarn(text){
  const now=Date.now();
  if(now-lastWarnSpeak<5000)return;
  lastWarnSpeak=now;
  speak(text);
}
function beep(freq,dur,vol=0.18,delay=0){
  const ac=getAudio(); if(!ac)return;
  const osc=ac.createOscillator(),gain=ac.createGain();
  osc.connect(gain);gain.connect(ac.destination);
  osc.frequency.value=freq;osc.type='sine';
  const t=ac.currentTime+delay;
  gain.gain.setValueAtTime(vol,t);
  gain.gain.exponentialRampToValueAtTime(0.001,t+dur);
  osc.start(t);osc.stop(t+dur);
}
function playRep(){beep(880,0.12);}
function playExDone(){beep(880,0.15);beep(1320,0.2,0.18,0.15);}
function playAllDone(){[880,1100,1320,1760].forEach((f,i)=>beep(f,0.2,0.2,i*0.12));}

// ── WAKE LOCK ────────────────────────────────
let wakeLock=null;
async function acquireWakeLock(){
  if(isIOS){startSilentAudio();return;}
  if(!('wakeLock' in navigator))return;
  try{wakeLock=await navigator.wakeLock.request('screen');}catch(e){}
}
function releaseWakeLock(){
  if(wakeLock){wakeLock.release();wakeLock=null;}
  stopSilentAudio();
}
function startSilentAudio(){
  if(silentAudio)return;
  try{
    const ac=getAudio(); if(!ac)return;
    const osc=ac.createOscillator(),gain=ac.createGain();
    gain.gain.value=0.0001;osc.connect(gain);gain.connect(ac.destination);
    osc.frequency.value=20;osc.start();
    silentAudio={osc,gain};
  }catch(e){}
}
function stopSilentAudio(){
  if(!silentAudio)return;
  try{silentAudio.osc.stop();silentAudio.osc.disconnect();silentAudio.gain.disconnect();}catch(e){}
  silentAudio=null;
}
document.addEventListener('visibilitychange',async()=>{
  if(document.visibilityState==='visible'&&wakeLock===null&&cvActive)await acquireWakeLock();
});

// ── DETECTORS ────────────────────────────────
class MarchDetector{
  constructor(){this.reset();}
  reset(){this.count=0;this.target=8;this.lUp=false;this.rUp=false;this.last=0;this.feedback='Lift each knee above hip height';}
  update(n){
    const now=Date.now();if(now-this.last<350)return false;
    const lK=n[13],lH=n[11],rK=n[14],rH=n[12];const thr=0.07*SF();let hit=false;
    if(okKp(lK)&&okKp(lH)){const up=lH.y-lK.y>thr;if(up&&!this.lUp){this.lUp=true;hit=true;this.feedback='Left knee up ✓';}if(!up)this.lUp=false;}
    if(okKp(rK)&&okKp(rH)){const up=rH.y-rK.y>thr;if(up&&!this.rUp){this.rUp=true;hit=true;this.feedback='Right knee up ✓';}if(!up)this.rUp=false;}
    if(hit){this.count=Math.min(this.count+1,this.target);this.last=now;return true;}
    if(!this.lUp&&!this.rUp&&this.count<this.target)this.feedback='March — lift knees higher';
    return false;
  }
  get done(){return this.count>=this.target;}get pct(){return this.count/this.target;}
}

class ArmRaiseDetector{
  constructor(){this.reset();}
  reset(){this.count=0;this.target=6;this.lUp=false;this.rUp=false;this.last=0;this.feedback='Swing arms up in big circles';}
  update(n){
    const now=Date.now();if(now-this.last<450)return false;
    const lW=n[9],lS=n[5],rW=n[10],rS=n[6];const thr=0.07*SF();let hit=false;
    if(okKp(lW)&&okKp(lS)){const up=lS.y-lW.y>thr;if(up&&!this.lUp){this.lUp=true;hit=true;this.feedback='Left arm up ✓';}if(!up)this.lUp=false;}
    if(okKp(rW)&&okKp(rS)){const up=rS.y-rW.y>thr;if(up&&!this.rUp){this.rUp=true;hit=true;this.feedback='Right arm up ✓';}if(!up)this.rUp=false;}
    if(hit){this.count=Math.min(this.count+1,this.target);this.last=now;return true;}
    if(!this.lUp&&!this.rUp&&this.count<this.target)this.feedback='Raise wrists above shoulder height';
    return false;
  }
  get done(){return this.count>=this.target;}get pct(){return this.count/this.target;}
}

class SitStandDetector{
  constructor(){this.reset();}
  reset(){this.count=0;this.target=5;this.phase='unknown';this.last=0;this.feedback='Sit in a chair then stand up fully';}
  update(n){
    const now=Date.now();if(now-this.last<600)return false;
    let ang=null;
    const lH=n[11],lK=n[13],lA=n[15],rH=n[12],rK=n[14],rA=n[16];
    if(okKp(lH)&&okKp(lK)&&okKp(lA))ang=jointAngle(lH,lK,lA);
    else if(okKp(rH)&&okKp(rK)&&okKp(rA))ang=jointAngle(rH,rK,rA);
    if(ang===null)return false;
    if(ang<130&&this.phase!=='sitting'){this.phase='sitting';this.last=now;this.feedback='Knees bent — now stand up tall!';}
    else if(ang>160&&this.phase==='sitting'){
      this.phase='standing';this.count=Math.min(this.count+1,this.target);this.last=now;this.feedback='Stood up ✓ — sit back down';return true;
    }else if(this.phase!=='sitting'&&this.count<this.target)this.feedback='Sit down first, then stand tall';
    return false;
  }
  get done(){return this.count>=this.target;}get pct(){return this.count/this.target;}
}

class SideBendDetector{
  constructor(){this.reset();}
  reset(){this.count=0;this.target=6;this.neutral=true;this.last=0;this.feedback='Lean clearly to one side, arm overhead';}
  update(n){
    const now=Date.now();if(now-this.last<500)return false;
    const lS=n[5],rS=n[6],lH=n[11],rH=n[12];
    if(!okKp(lS)||!okKp(rS)||!okKp(lH)||!okKp(rH))return false;
    const shX=(lS.x+rS.x)/2,hipX=(lH.x+rH.x)/2,off=Math.abs(shX-hipX);const thr=0.08*SF();
    if(off>thr&&this.neutral){this.neutral=false;this.count=Math.min(this.count+1,this.target);this.last=now;this.feedback='Good bend ✓ — lean the other way';return true;}
    else if(off<0.04&&!this.neutral)this.neutral=true;
    else if(this.count<this.target)this.feedback=off>0.04?'Lean a bit further…':'Lean clearly to one side';
    return false;
  }
  get done(){return this.count>=this.target;}get pct(){return this.count/this.target;}
}

class CalfRaiseDetector{
  constructor(){this.reset();}
  reset(){this.count=0;this.target=8;this.hist=[];this.raised=false;this.last=0;this.feedback='Rise up onto your tiptoes';}
  update(n){
    const now=Date.now();
    const lS=n[5],rS=n[6];if(!okKp(lS)&&!okKp(rS))return false;
    const shY=(okKp(lS)&&okKp(rS))?(lS.y+rS.y)/2:(okKp(lS)?lS.y:rS.y);
    this.hist.push({t:now,y:shY});
    this.hist=this.hist.filter(h=>now-h.t<3000);
    if(this.hist.length<8){this.feedback='Hold still… calibrating';return false;}
    const sorted=[...this.hist].sort((a,b)=>a.y-b.y);
    const baseline=sorted[Math.floor(sorted.length*0.6)].y;
    const thr=0.025*SF();const isUp=shY<baseline-thr;
    if(now-this.last<400)return false;
    if(isUp&&!this.raised){this.raised=true;this.count=Math.min(this.count+1,this.target);this.last=now;this.feedback='Tiptoes ✓ — lower back down';return true;}
    else if(!isUp&&this.raised){this.raised=false;if(this.count<this.target)this.feedback='Rise up on tiptoes again';}
    else if(!isUp&&this.count<this.target)this.feedback='Rise slowly onto tiptoes';
    return false;
  }
  get done(){return this.count>=this.target;}get pct(){return this.count/this.target;}
}

// ── STORAGE ──────────────────────────────────
const todayStr=()=>new Date().toISOString().split('T')[0];

function getData(p){
  try{return JSON.parse(localStorage.getItem('extrack_'+p)||'{"streak":0,"lastDone":null,"best":0,"history":[]}');}
  catch(e){return{streak:0,lastDone:null,best:0,history:[]};}
}
function saveData(p,d){try{localStorage.setItem('extrack_'+p,JSON.stringify(d));}catch(e){}}
const doneToday=p=>getData(p).lastDone===todayStr();

// ── HOME RENDER ──────────────────────────────
function refreshHome(){
  const today=todayStr();
  ['mom','dad'].forEach(p=>{
    const d=getData(p);
    const s=d.streak||0;
    document.getElementById(p+'-streak').textContent=s+' day streak';
    document.getElementById(p+'-badge').style.display=doneToday(p)?'inline-block':'none';
    const best=d.best||0;
    const bestEl=document.getElementById(p+'-best');
    bestEl.textContent=best>1?'Best: '+best+' days':'';

    // Weekly dots
    const hist=d.history||[];
    const wrap=document.getElementById(p+'-dots');wrap.innerHTML='';
    for(let i=6;i>=0;i--){
      const dateStr=new Date(Date.now()-i*86400000).toISOString().split('T')[0];
      const el=document.createElement('div');
      el.className='wdot'+(dateStr===today?' today':hist.includes(dateStr)?' hit':'');
      wrap.appendChild(el);
    }
  });
  document.getElementById('sens-label').textContent=SENS==='easy'?'Easy':'Standard';
  document.getElementById('voice-label').textContent=VOICE?'On':'Off';
}

// ── CAMERA + MODEL HELPERS ───────────────────
async function getCameraPermissionInstructions(){
  if(navigator.permissions&&navigator.permissions.query){
    try{
      const status=await navigator.permissions.query({name:'camera'});
      if(status.state==='denied'){
        return isIOS? 'Go to Settings → Safari → Camera → set to Allow, then come back.' : isAndroid? 'Tap the camera icon in your browser address bar and allow camera.' : 'Please allow camera in your browser settings.';
      }
    }catch(e){}
  }
  if(isIOS) return 'Go to Settings → Safari → Camera → set to Allow, then come back.';
  if(isAndroid) return 'Tap the camera icon in your browser address bar and allow camera.';
  return 'Please allow camera in your browser settings.';
}

async function loadModel(){
  if(typeof poseDetection==='undefined') throw new Error('TF.js not loaded');
  const loadPromise=poseDetection.createDetector(
    poseDetection.SupportedModels.MoveNet,
    {modelType:poseDetection.movenet.modelType.SINGLEPOSE_LIGHTNING}
  );
  const timeout=new Promise((_,reject)=>setTimeout(()=>reject(new Error('Model load timed out')),30000));
  poseDetector=await Promise.race([loadPromise,timeout]);
}

function showInitError(isCamDenied,message){
  const overlay=document.getElementById('model-overlay');
  overlay.innerHTML=`
      <div style="font-size:1.4rem">${isCamDenied?'🚫':'⚠️'}</div>
      <div class="load-label">${isCamDenied?'Camera blocked':"Couldn't load"}</div>
      <div class="load-sub" style="color:#fc8181">${message}</div>
      ${isCamDenied?'':'<button class="overlay-retry" onclick="retryCV()">Try Again</button>'}
      <button class="overlay-retry" style="background:#4a5568;color:white;margin-top:6px" onclick="goHome()">Go Back</button>`;
}

// ── CV INIT ───────────────────────────────────
async function initCV(){
  const overlay=document.getElementById('model-overlay');
  const dot=document.getElementById('cv-dot');
  const txt=document.getElementById('cv-text');
  const lbl=document.getElementById('load-label');
  const bar=document.getElementById('load-bar');
  overlay.classList.remove('hidden');cvActive=false;

  const steps=[
    [5,'Starting camera…'],
    [30,'Camera ready…'],
    [55,'Downloading pose model…'],
    [75,'Loading neural network…'],
    [88,'Warming up GPU…'],
  ];
  let stepIdx=0;
  const stepTimer=setInterval(()=>{
    if(stepIdx<steps.length){
      bar.style.width=steps[stepIdx][0]+'%';
      lbl.textContent=steps[stepIdx][1];
      stepIdx++;
    }
  },1800);

  try{
    camStream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'user',width:{ideal:640},height:{ideal:480}},audio:false});
    const vid=document.getElementById('camera-feed');
    vid.srcObject=camStream;
    await new Promise(res=>{vid.onloadedmetadata=()=>{vid.play();res();};});

    if(typeof poseDetection==='undefined')throw new Error('TF.js not loaded');

    if(!poseDetector){
      await loadModel();
    }

    // Warm-up inference to prevent first-rep lag
    if(vid.readyState>=2) await poseDetector.estimatePoses(vid,{flipHorizontal:false});

    clearInterval(stepTimer);bar.style.width='100%';
    await new Promise(res=>setTimeout(res,300));

    overlay.classList.add('hidden');
    cvActive=true;dot.className='cv-dot on';
    txt.textContent='Pose detection active — do your exercise!';
    document.getElementById('cv-reps').textContent='';
    await acquireWakeLock();
    startRaf();

  }catch(err){
    clearInterval(stepTimer);
    console.warn('CV init failed:',err);
    const errMsg=(err && err.name)||err.message||String(err);
    const isCamDenied=errMsg==='NotAllowedError'||errMsg.includes('NotAllowed')||errMsg.includes('Permission');
    const helpText=isCamDenied?await getCameraPermissionInstructions():"Couldn't load — check your connection and tap to retry.";
    showInitError(isCamDenied,helpText);
  }
}

function retryCV(){
  document.getElementById('model-overlay').innerHTML=`
    <div class="spinner"></div>
    <div class="load-label" id="load-label">Starting camera…</div>
    <div class="load-bar-track"><div class="load-bar" id="load-bar"></div></div>
    <div class="load-sub" id="load-sub">Stand 5–8 ft away so your full body is visible</div>`;
  stopRaf();
  if(camStream){camStream.getTracks().forEach(t=>t.stop());camStream=null;}
  setTimeout(initCV,300);
}

function stopCV(){
  cvActive=false;isDetecting=false;
  if(camStream){camStream.getTracks().forEach(t=>t.stop());camStream=null;}
  const vid=document.getElementById('camera-feed');if(vid)vid.srcObject=null;
  const overlay=document.getElementById('model-overlay');
  if(overlay){
    overlay.classList.remove('hidden');
    overlay.innerHTML=`<div class="spinner"></div><div class="load-label" id="load-label">Starting camera…</div><div class="load-bar-track"><div class="load-bar" id="load-bar"></div></div><div class="load-sub" id="load-sub">Stand 5–8 ft away so your full body is visible</div>`;
  }
}

// ── RAF + DETECTION LOOP ─────────────────────
function startRaf(){
  const canvas=document.getElementById('stick-canvas');
  const zone=document.getElementById('camera-zone');

  resizeHandler=()=>{
    canvas.width=zone.clientWidth;
    canvas.height=zone.clientHeight;
  };
  resizeHandler();
  window.addEventListener('resize',resizeHandler);
  window.addEventListener('orientationchange',resizeHandler);

  async function loop(){
    animT+=0.025;
    const ctx=canvas.getContext('2d');
    ctx.clearRect(0,0,canvas.width,canvas.height);

    if(cvActive&&poseDetector&&!isDetecting){
      const vid=document.getElementById('camera-feed');
      if(vid&&vid.readyState>=2){
        isDetecting=true;
        try{
          const poses=await poseDetector.estimatePoses(vid,{flipHorizontal:false});
          if(poses.length>0){
            const kps=poses[0].keypoints;
            const vw=vid.videoWidth||canvas.width,vh=vid.videoHeight||canvas.height;
            const nkps=normKps(kps,vw,vh);

            // Body visibility check
            const visCount=CORE_KP.filter(i=>nkps[i]&&nkps[i].score>=0.3).length;
            const warn=document.getElementById('body-warn');
            const bodyBlocked=visCount<4;
            if(bodyBlocked){warn.textContent='Step back — full body not in frame';warn.classList.add('show');speakWarn('Step back so your full body is visible');}
            else{warn.classList.remove('show');}

            // Update current detector
            const hit=bodyBlocked?false:dets[exIdx].update(nkps);
            if(hit){onRep();}
            updateCvStrip();updateBtn();renderDots();
            updateDebug(nkps,visCount,bodyBlocked);

            // Auto-advance when exercise completes
            if(dets[exIdx].done&&!justCompleted.has(exIdx)&&!advancing){
              justCompleted.add(exIdx);
              playExDone();
              speak('Well done. Moving to the next exercise.');
              advancing=true;
              setTimeout(autoAdvance,1600);
            }

            drawSkeleton(ctx,kps,canvas.width,canvas.height,vw,vh);
          }
        }catch(_){}
        finally{isDetecting=false;}
      }
    }

    exercises[exIdx].draw(ctx,canvas.width,canvas.height,animT);
    raf=requestAnimationFrame(loop);
  }
  loop();
}

function stopRaf(){
  if(raf){cancelAnimationFrame(raf);raf=null;}
  if(resizeHandler){
    window.removeEventListener('resize',resizeHandler);
    window.removeEventListener('orientationchange',resizeHandler);
    resizeHandler=null;
  }
}

function autoAdvance(){
  advancing=false;
  // Find next incomplete exercise
  const next=exercises.findIndex((_,i)=>!dets[i].done&&i!==exIdx);
  if(next>=0){
    exIdx=next;animT=0;
    renderEx();renderDots();updateCvStrip();updateBtn();
    speak('Exercise '+(exIdx+1)+': '+exercises[exIdx].name+'. '+exercises[exIdx].desc.replace(/\s*\([^)]*\)/,''));
  } else {
    // All done — check if button is now active
    updateBtn();
  }
}

    speak(String(det.count));

// ── SKELETON OVERLAY ─────────────────────────
function drawSkeleton(ctx,kps,cw,ch,vw,vh){
  const sx=cw/vw,sy=ch/vh;
  const fx=x=>cw-x*sx,fy=y=>y*sy; // flip x to match mirrored video
  const MIN=0.3;
  ctx.strokeStyle='rgba(72,187,120,0.75)';ctx.lineWidth=2.5;ctx.lineCap='round';
  for(const[i,j]of BONES){
    const a=kps[i],b=kps[j];if(!a||!b||a.score<MIN||b.score<MIN)continue;
    ctx.beginPath();ctx.moveTo(fx(a.x),fy(a.y));ctx.lineTo(fx(b.x),fy(b.y));ctx.stroke();
  }
  for(const k of kps){
    if(k.score<MIN)continue;
    ctx.beginPath();ctx.arc(fx(k.x),fy(k.y),4,0,Math.PI*2);
    ctx.fillStyle=k.score>0.6?'rgba(72,187,120,0.95)':'rgba(72,187,120,0.5)';ctx.fill();
  }
}

function updateDebug(n,visCount,bodyBlocked){
  const panel=document.getElementById('debug-panel');
  if(!debugMode||!panel)return;
  const fmt=v=>Number.isFinite(v)?v.toFixed(3):'n/a';
  const ex=exercises[exIdx];
  const lines=[
    'Exercise: '+ex.name,
    'Sensitivity: '+SENS+' (SF '+SF()+')',
    'Visible core: '+visCount+'/6 '+(bodyBlocked?'PAUSED':'counting')
  ];
  if(ex.id==='march'){
    const thr=0.07*SF();
    lines.push('thr hip-knee Y > '+fmt(thr));
    lines.push('L '+fmt(n[11]?.y-n[13]?.y)+' R '+fmt(n[12]?.y-n[14]?.y));
  }else if(ex.id==='armcirc'){
    const thr=0.07*SF();
    lines.push('thr shoulder-wrist Y > '+fmt(thr));
    lines.push('L '+fmt(n[5]?.y-n[9]?.y)+' R '+fmt(n[6]?.y-n[10]?.y));
  }else if(ex.id==='sitstand'){
    const l=okKp(n[11])&&okKp(n[13])&&okKp(n[15])?jointAngle(n[11],n[13],n[15]):NaN;
    const r=okKp(n[12])&&okKp(n[14])&&okKp(n[16])?jointAngle(n[12],n[14],n[16]):NaN;
    lines.push('sit < 130, stand > 160');
    lines.push('knee angle L '+fmt(l)+' R '+fmt(r));
  }else if(ex.id==='sidebend'){
    const sh=okKp(n[5])&&okKp(n[6])?(n[5].x+n[6].x)/2:NaN;
    const hip=okKp(n[11])&&okKp(n[12])?(n[11].x+n[12].x)/2:NaN;
    const off=Math.abs(sh-hip),thr=0.08*SF();
    lines.push('thr shoulder-hip X > '+fmt(thr));
    lines.push('offset '+fmt(off));
  }else if(ex.id==='calfrise'){
    const det=dets[exIdx],thr=0.025*SF();
    const sh=(okKp(n[5])&&okKp(n[6]))?(n[5].y+n[6].y)/2:(okKp(n[5])?n[5].y:n[6]?.y);
    const sorted=[...(det?.hist||[])].sort((a,b)=>a.y-b.y);
    const base=sorted.length?sorted[Math.floor(sorted.length*0.6)].y:NaN;
    lines.push('thr baseline-shoulder Y > '+fmt(thr));
    lines.push('baseline '+fmt(base)+' shoulder '+fmt(sh)+' diff '+fmt(base-sh));
  }
  const det=dets[exIdx];
  lines.push('reps '+det.count+'/'+det.target);
  panel.textContent=lines.join('\n');
}

function updateBtn(){
  const btn=document.getElementById('done-btn');
  if(doneToday(profile)){btn.textContent='✓ Already done today!';btn.disabled=true;return;}
  const rem=dets.filter(d=>!d.done).length;
  if(rem===0){btn.textContent='✓ All verified — Save Streak!';btn.disabled=false;}
  else{btn.textContent=rem+' exercise'+(rem>1?'s':'')+' remaining';btn.disabled=true;}
}

function nextEx(){exIdx=(exIdx+1)%exercises.length;animT=0;renderEx();renderDots();updateCvStrip();updateBtn();}
function prevEx(){exIdx=(exIdx-1+exercises.length)%exercises.length;animT=0;renderEx();renderDots();updateCvStrip();updateBtn();}

// ── MARK DONE ────────────────────────────────
function markDone(){
  if(!dets.every(d=>d.done))return;
  playAllDone();
  speak('Excellent work. All exercises complete for today!');
  const d=getData(profile);
  const today=todayStr();
  if(d.lastDone===today)return;
  const last=d.lastDone?new Date(d.lastDone+'T00:00:00'):null;
  const now=new Date(today+'T00:00:00');
  const daysSinceLast=last?Math.round((now-last)/86400000):Infinity;
  d.streak=daysSinceLast<=2?(d.streak||0)+1:1;
  d.lastDone=today;
  d.best=Math.max(d.best||0,d.streak);
  const hist=d.history||[];
  if(!hist.includes(d.lastDone))hist.push(d.lastDone);
  d.history=hist.slice(-60); // keep last 60 days
  saveData(profile,d);
  document.getElementById('streak-num').textContent=d.streak;
  showCel(d.streak,profile);
}

// ── CELEBRATION ──────────────────────────────
function showCel(streak,p){
  document.getElementById('cel-streak').textContent='🔥 '+streak;
  document.getElementById('cel-title').textContent=p==='mom'?'Amazing, Mom!':'Amazing, Dad!';
  document.getElementById('cel-desc').textContent=streak===1?'Day 1 — the streak starts! See you tomorrow.':streak+' days in a row — keep going!';

  // Exercise checklist
  const wrap=document.getElementById('cel-exercises');wrap.innerHTML='';
  exercises.forEach(ex=>{
    const row=document.createElement('div');row.className='cel-ex-row';
    row.innerHTML=`<span class="cel-check">✓</span><span>${ex.name}</span>`;
    wrap.appendChild(row);
  });

  // Confetti
  const area=document.getElementById('confetti-area');area.innerHTML='';
  const cols=['#f6ad55','#68d391','#63b3ed','#fc8181','#b794f4','#fef08a'];
  for(let i=0;i<70;i++){
    const el=document.createElement('div'),sz=7+Math.random()*11;
    el.style.cssText=`position:absolute;width:${sz}px;height:${sz}px;background:${cols[i%cols.length]};
      border-radius:${Math.random()>.5?'50%':'2px'};left:${Math.random()*100}%;top:-20px;
      animation:fall ${1.5+Math.random()*2}s linear ${Math.random()*0.8}s forwards;`;
    area.appendChild(el);
  }
  if(!document.getElementById('cfall')){
    const s=document.createElement('style');s.id='cfall';
    s.textContent='@keyframes fall{to{transform:translateY(100vh) rotate(720deg);opacity:0}}';
    document.head.appendChild(s);
  }
  document.getElementById('celebration').classList.add('show');
}

async function shareCompletion(){
  const who=profile==='mom'?'Mom':'Dad';
  const text=who+' finished '+(profile==='mom'?'her':'his')+' exercises today! 💪';
  if(navigator.share){
    try{await navigator.share({text,url:location.href});return;}catch(e){}
  }
  const encoded=encodeURIComponent(text);
  location.href=isIOS?'sms:&body='+encoded:'https://wa.me/?text='+encoded;
}

function closeCel(){document.getElementById('celebration').classList.remove('show');goHome();}

async function registerServiceWorker(){
  if(!('serviceWorker' in navigator))return null;
  try{return await navigator.serviceWorker.register('/sw.js');}
  catch(e){console.warn('Service worker registration failed',e);return null;}
}

async function requestReminderPermission(){
  if(isIOS||!('Notification' in window)||!('serviceWorker' in navigator))return;
  if(localStorage.getItem('extrack_notif_asked')==='true'&&Notification.permission!=='granted')return;
  localStorage.setItem('extrack_notif_asked','true');
  const permission=Notification.permission==='default'?await Notification.requestPermission():Notification.permission;
  if(permission!=='granted')return;
  const reg=await navigator.serviceWorker.ready;
  if(reg.active)reg.active.postMessage({type:'schedule-reminder',hour:9,minute:0});
}

// ── STICK FIGURE GUIDES ───────────────────────
function drawStick(ctx,cx,cy,s,p){
  ctx.strokeStyle='rgba(255,255,255,0.42)';ctx.lineWidth=3*(s/60);ctx.lineCap='round';ctx.lineJoin='round';
  const c=(x,y)=>[cx+x*s,cy+y*s];
  ctx.beginPath();ctx.arc(...c(0,p.headY-0.5),0.5*s,0,Math.PI*2);
  ctx.fillStyle='rgba(255,255,255,0.42)';ctx.fill();
  const ln=(a,b)=>{ctx.beginPath();ctx.moveTo(...a);ctx.lineTo(...b);ctx.stroke();};
  ln(c(0,p.neckY),c(0,p.hipY));
  ln(c(0,p.shoulderY),c(...p.lEl));ln(c(...p.lEl),c(...p.lWr));
  ln(c(0,p.shoulderY),c(...p.rEl));ln(c(...p.rEl),c(...p.rWr));
  ln(c(0,p.hipY),c(...p.lKn));ln(c(...p.lKn),c(...p.lFt));
  ln(c(0,p.hipY),c(...p.rKn));ln(c(...p.rKn),c(...p.rFt));
}
function glbl(ctx,x,y,text){
  ctx.save();ctx.font='bold 13px -apple-system,sans-serif';ctx.textAlign='center';
  const w=ctx.measureText(text).width+18;
  ctx.fillStyle='rgba(0,0,0,0.5)';ctx.beginPath();ctx.roundRect(x-w/2,y-13,w,21,5);ctx.fill();
  ctx.fillStyle='white';ctx.fillText(text,x,y+3);ctx.restore();
}
function drawMarch(ctx,W,H,t){
  const cx=W*.78,cy=H*.42,s=Math.min(W,H)*.1,ph=Math.sin(t*3);
  const lKY=2.5-Math.max(0,ph)*1.5,rKY=2.5+Math.max(0,-ph)*1.5;
  drawStick(ctx,cx,cy,s,{headY:-3.5,neckY:-3,shoulderY:-2.3,hipY:0,
    lEl:[-0.8-ph*.3,-1.5+ph*.3],lWr:[-1.2-ph*.5,-2.5+ph*.5],
    rEl:[0.8+ph*.3,-1.5-ph*.3],rWr:[1.2+ph*.5,-2.5-ph*.5],
    lKn:[-0.5,lKY],lFt:[-0.6,lKY+1.2],rKn:[0.5,rKY],rFt:[0.6,rKY+1.2]});
  glbl(ctx,cx,cy-s*4.2,'Lift knees!');
}
function drawArmCircle(ctx,W,H,t){
  const cx=W*.78,cy=H*.42,s=Math.min(W,H)*.1,a=t*2;
  drawStick(ctx,cx,cy,s,{headY:-3.5,neckY:-3,shoulderY:-2.3,hipY:0,
    lEl:[-1+Math.cos(a+Math.PI)*.8,-2.3+Math.sin(a+Math.PI)*.8],lWr:[-1+Math.cos(a+Math.PI)*1.6,-2.3+Math.sin(a+Math.PI)*1.6],
    rEl:[1+Math.cos(a)*.8,-2.3+Math.sin(a)*.8],rWr:[1+Math.cos(a)*1.6,-2.3+Math.sin(a)*1.6],
    lKn:[-0.5,1.5],lFt:[-0.6,2.8],rKn:[0.5,1.5],rFt:[0.6,2.8]});
  glbl(ctx,cx,cy-s*4.2,'Circle arms!');
}
function drawSitToStand(ctx,W,H,t){
  const cx=W*.78,cy=H*.46,s=Math.min(W,H)*.09;
  const ph=(Math.sin(t*1.5)+1)/2,bend=ph*1.2,rise=-ph*1.5;
  drawStick(ctx,cx,cy+rise*s,s,{headY:-3.5,neckY:-3,shoulderY:-2.3,hipY:bend,
    lEl:[-0.8,-1.3],lWr:[-1.2,-0.5],rEl:[0.8,-1.3],rWr:[1.2,-0.5],
    lKn:[-0.5,bend+1.5-bend*.5],lFt:[-0.7,bend+2.5],rKn:[0.5,bend+1.5-bend*.5],rFt:[0.7,bend+2.5]});
  glbl(ctx,cx,cy-s*4.8,'Stand up fully!');
}
function drawSideBend(ctx,W,H,t){
  const cx=W*.78,cy=H*.42,s=Math.min(W,H)*.1,lean=Math.sin(t*1.2)*.6;
  drawStick(ctx,cx,cy,s,{headY:-3.5+lean*.3,neckY:-3+lean*.2,shoulderY:-2.3,hipY:0,
    lEl:[-0.8,-1.8],lWr:[-1+lean*1.5,-3.5+lean*.5],rEl:[0.6,-1.5],rWr:[0.8,-0.8],
    lKn:[-0.5,1.5],lFt:[-0.6,2.8],rKn:[0.5,1.5],rFt:[0.6,2.8]});
  glbl(ctx,cx,cy-s*4.5,'Lean side to side!');
}
function drawCalfRaise(ctx,W,H,t){
  const cx=W*.78,cy=H*.42,s=Math.min(W,H)*.1,rise=(Math.sin(t*2)+1)/2*.6;
  drawStick(ctx,cx,cy-rise*s,s,{headY:-3.5,neckY:-3,shoulderY:-2.3,hipY:0,
    lEl:[-1.2,-1.5],lWr:[-1.5,-0.5],rEl:[1.2,-1.5],rWr:[1.5,-0.5],
    lKn:[-0.5,1.6],lFt:[-0.5,2.5-rise*.5],rKn:[0.5,1.6],rFt:[0.5,2.5-rise*.5]});
  glbl(ctx,cx,cy-s*4.5-rise*s,'Rise on tiptoes!');
}

refreshHome();
registerServiceWorker();
